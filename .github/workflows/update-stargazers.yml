name: Update Stargazers Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch API Data
        run: |
          # Création du dossier caché data dans .github
          mkdir -p .github/data
          
          # Récupère la liste des derniers stargazers et la sauvegarde
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github+json" \
               "https://api.github.com/repos/${{ github.repository }}/stargazers?per_page=16" > .github/data/stargazers.json
          
          # Récupère les infos globales du dépôt
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github+json" \
               "https://api.github.com/repos/${{ github.repository }}" > .github/data/repo.json

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Ajoute les fichiers depuis le nouveau chemin
          git add .github/data/stargazers.json .github/data/repo.json
          
          git commit -m "chore: update stargazers data" || echo "No changes to commit"
          git push
