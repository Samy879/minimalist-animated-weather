<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="sunGradient" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFE0A3"/>
      <stop offset="55%" stop-color="#FFC670"/>
      <stop offset="100%" stop-color="#F2A65A"/>
    </radialGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFCE7A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFCE7A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9BC8ED"/>
      <stop offset="100%" stop-color="#5B9BD5"/>
    </linearGradient>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#3E6E9E" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Halo doux derrière le soleil -->
  <circle cx="86" cy="38" r="40" fill="url(#sunGlow)">
    <animate attributeName="r" values="38;42;38" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Rayons du soleil : fins, arrondis, légère pulsation -->
  <g stroke="#F7B860" stroke-width="3.5" stroke-linecap="round" opacity="0.9">
    <g>
      <line x1="86" y1="8" x2="86" y2="1"/>
      <line x1="112" y1="16" x2="117" y2="11"/>
      <line x1="120" y1="42" x2="127" y2="42"/>
      <line x1="60" y1="16" x2="55" y2="11"/>
      <animateTransform attributeName="transform" type="rotate" from="0 86 38" to="8 86 38"
        dur="6s" values="0 86 38;8 86 38;0 86 38" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Soleil -->
  <circle cx="86" cy="38" r="23" fill="url(#sunGradient)" filter="url(#softShadow)"/>
  <!-- Petit reflet pour la profondeur -->
  <ellipse cx="79" cy="30" rx="7" ry="4.5" fill="#FFFFFF" opacity="0.35"/>

  <!-- Nuage : contour unique en courbes lisses, qui dérive doucement (et varie en hauteur) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 6,-4; 0,0; -6,3; 0,0" keyTimes="0;0.25;0.5;0.75;1"
      dur="12s" calcMode="spline"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
      repeatCount="indefinite"/>

    <g filter="url(#softShadow)">
      <g transform="translate(29,25) scale(3.75)">
        <path fill="url(#cloudGradient)" d="M19.35,10.04
          C18.67,6.59 15.64,4 12,4
          C9.11,4 6.6,5.64 5.35,8.04
          C2.34,8.36 0,10.91 0,14
          A6,6 0 0,0 6,20
          H19
          A5,5 0 0,0 24,15
          C24,12.36 21.95,10.22 19.35,10.04
          Z"/>
      </g>
    </g>

    <!-- Petit reflet sur le nuage -->
    <ellipse cx="65" cy="45" rx="9" ry="4.5" fill="#FFFFFF" opacity="0.28"/>
  </g>

  <!-- Effet de vent : synchronisé avec le sens de dérive du nuage (droite puis gauche) -->
  <g stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" fill="none" opacity="0.85">

    <!-- Phase 1 (0s-6s) : le nuage avance, le vent souffle vers la droite -->
    <path d="M0,0 Q6,-3.5 12,0 T24,0">
      <animateTransform attributeName="transform" type="translate"
        values="-24,99; -24,99; -8,99; 22,99; 46,99; 46,99"
        keyTimes="0;0.03;0.12;0.32;0.5;1" dur="12s" calcMode="spline"
        keySplines="0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1"
        repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.85;0.85;0;0"
        keyTimes="0;0.03;0.12;0.4;0.5;1" dur="12s" repeatCount="indefinite"/>
    </path>
    <path d="M0,0 Q5,3 10,0 T20,0">
      <animateTransform attributeName="transform" type="translate"
        values="-20,109; -20,109; -4,109; 26,109; 44,109; 44,109"
        keyTimes="0;0.06;0.16;0.36;0.5;1" dur="12s" calcMode="spline"
        keySplines="0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1"
        repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.85;0.85;0;0"
        keyTimes="0;0.06;0.16;0.44;0.5;1" dur="12s" repeatCount="indefinite"/>
    </path>
    <path d="M0,0 Q6,-3 12,0 T26,0">
      <animateTransform attributeName="transform" type="translate"
        values="-26,119; -26,119; -8,119; 20,119; 40,119; 40,119"
        keyTimes="0;0.1;0.2;0.4;0.5;1" dur="12s" calcMode="spline"
        keySplines="0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1"
        repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.85;0.85;0;0"
        keyTimes="0;0.1;0.2;0.48;0.5;1" dur="12s" repeatCount="indefinite"/>
    </path>

    <!-- Phase 2 (6s-12s) : le nuage recule, le vent souffle vers la gauche -->
    <path d="M0,0 Q6,-3.5 12,0 T24,0">
      <animateTransform attributeName="transform" type="translate"
        values="46,99; 46,99; 46,99; 22,99; -8,99; -24,99; -24,99"
        keyTimes="0;0.5;0.53;0.62;0.82;0.91;1" dur="12s" calcMode="spline"
        keySplines="0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1"
        repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;0.85;0.85;0;0"
        keyTimes="0;0.5;0.53;0.6;0.88;0.91;1" dur="12s" repeatCount="indefinite"/>
    </path>
    <path d="M0,0 Q5,3 10,0 T20,0">
      <animateTransform attributeName="transform" type="translate"
        values="44,109; 44,109; 44,109; 26,109; -4,109; -20,109; -20,109"
        keyTimes="0;0.5;0.56;0.66;0.84;0.94;1" dur="12s" calcMode="spline"
        keySplines="0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1"
        repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;0.85;0.85;0;0"
        keyTimes="0;0.5;0.56;0.64;0.92;0.94;1" dur="12s" repeatCount="indefinite"/>
    </path>
    <path d="M0,0 Q6,-3 12,0 T26,0">
      <animateTransform attributeName="transform" type="translate"
        values="40,119; 40,119; 40,119; 20,119; -8,119; -26,119; -26,119"
        keyTimes="0;0.5;0.6;0.7;0.88;0.97;1" dur="12s" calcMode="spline"
        keySplines="0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1;0.3 0 0.7 1"
        repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;0.85;0.85;0;0"
        keyTimes="0;0.5;0.6;0.68;0.96;0.97;1" dur="12s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
